    font-size: 10px;
    color: var(--text3);

    align-items: center;
    justify-content: center;

    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.2;

    color: var(--text2);
    line-height: 1.6;

    flex-wrap: wrap;
    margin-top: 8px;

    border-radius: 4px;

// Build nav
const nav = document.getElementById('nav');
const main = document.getElementById('main');

modules.forEach((m, i) => {
  const item = document.createElement('div');
  item.className = 'nav-item' + (i === 0 ? ' active' : '');
  item.dataset.index = i;
  item.innerHTML = `
    <div class="nav-num">${m.id}</div>
    <div class="nav-info">
      <div class="nav-title">${m.title}</div>
      <div class="nav-cu">${m.cu}</div>
    </div>`;
  item.addEventListener('click', () => switchPanel(i));
  nav.appendChild(item);

  const panel = document.createElement('div');
  panel.className = 'panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + i;
  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-icon" style="background:${m.iconBg}">${m.icon}</div>
      <div class="panel-meta">
        <div class="panel-title">${m.title}</div>
        <div class="panel-desc">${m.desc}</div>
        <div class="tags">${m.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="diagram-card">
      <div class="loading-msg">Generando diagrama<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
      <div class="mermaid" id="mermaid-${i}" style="display:none"></div>
    </div>`;
  main.appendChild(panel);
});

function switchPanel(idx) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[data-index="${idx}"]`).classList.add('active');
  document.getElementById('panel-' + idx).classList.add('active');
  renderDiagram(idx);
}

const rendered = new Set();

async function renderDiagram(idx) {
  if (rendered.has(idx)) return;
  rendered.add(idx);
  const m = modules[idx];
  const container = document.getElementById('mermaid-' + idx);
  const loading = container.parentElement.querySelector('.loading-msg');
  try {
    const { svg } = await mermaid.render('diag-' + idx, 'classDiagram\n' + m.diagram.replace('classDiagram\n',''));
    container.innerHTML = svg;
    container.style.display = 'flex';
    if (loading) loading.style.display = 'none';
  } catch(e) {
    if (loading) loading.textContent = 'Error al renderizar el diagrama.';
    console.error(e);
  }
}

mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    darkMode: true,
    background: '#13161d',
    primaryColor: '#1a1e28',
    primaryBorderColor: '#3a4058',
    primaryTextColor: '#e8eaf0',
    secondaryColor: '#1a2230',
    tertiaryColor: '#1e1a2e',
    lineColor: '#4f6080',
    textColor: '#c0c4d0',
    fontSize: '13px',
    fontFamily: '"DM Mono", monospace',
    classText: '#e8eaf0',
    fillType0: '#1a2030',
    attributeBackgroundColorEven: '#161920',
    attributeBackgroundColorOdd: '#1a1e28',
    nodeBorder: '#3a4058',
  }
});

// Render first panel
renderDiagram(0);
</script>
